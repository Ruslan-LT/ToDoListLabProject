<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <button onclick="createTask()">+ Додати задачу</button>
    <div class="logo">📝 TaskFlow</div>

    <nav class="nav" id="nav">
        <a href="#">Головна</a>
        <a href="#">Мої задачі</a>
        <a href="#">Профіль</a>
    </nav>

    <div class="burger" id="burger">☰</div>
</header>

<main class="main">
    <h1 class="title">Мої завдання</h1>

    <div class="cards">
        <div class="card">
            <h3>Зробити лабораторну</h3>
            <p>Node.js + адаптив</p>
            <span class="status done">Виконано</span>
        </div>

        <div class="card">
            <h3>Написати код</h3>
            <p>Backend частина</p>
            <span class="status pending">В процесі</span>
        </div>

        <div class="card">
            <h3>Зробити коміти</h3>
            <p>GitHub</p>
            <span class="status done">Виконано</span>
        </div>
    </div>
</main>

<footer class="footer">
    <p>© 2026 TaskFlow</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
